<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Trail Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<div class="control-panel">
    <h3>Select Your Pub</h3>
    <p id="coords-display">Click on the map</p>
    
    <div style="margin: 15px 0;">
        <label for="timeSlider">Target Walk Time: <b id="timeVal">35</b> mins</label>
        <input type="range" id="timeSlider" min="15" max="90" value="35" step="5" style="width:100%;">
    </div>

    <button id="generateBtn" onclick="requestBoundary()">Map Boundary</button>
    <p id="status-message"></p>
</div>

    <div id="map"></div>

    <script src="/static/app.js"></script>
</body>
</html>
