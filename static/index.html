<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Trail Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; color: #333; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #fff; }
        button:hover { background: #e2e2e2; }
    </style>
</head>
<body>
    <h1>On-Inn Trail Router Wireframe</h1>
    <button id="testBtn">Call Python Backend</button>
    <p id="output">Click the button to test communication...</p>

    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            document.getElementById('output').innerText = "Contacting Render server...";
            try {
                // Hits the FastAPI endpoint we created in main.py
                const response = await fetch('/api/hello');
                const data = await response.json();
                document.getElementById('output').innerText = data.message;
            } catch (err) {
                document.getElementById('output').innerText = "Error reaching the backend.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
